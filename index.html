<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Tournament Management System - Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --bg-color: #f3f4f6;
            --text-dark: #1f2937;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; }
        
        
        .sidebar { width: 250px; background-color: #111827; color: white; height: 100vh; padding: 20px 0; position: fixed; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 1.2rem; color: #60a5fa; }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; padding: 15px 20px; color: #d1d5db; text-decoration: none; transition: 0.3s; }
        .sidebar ul li a:hover, .sidebar ul li a.active { background-color: #374151; border-left: 4px solid var(--primary); color: white; }
        
        
        .main-content { margin-left: 250px; padding: 30px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { color: #6b7280; font-size: 1rem; margin-bottom: 10px; }
        .card .number { font-size: 2rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>Tournament DB</h2>
        <ul>
            <li><a href="index.html" class="active">🏠 Main Page</a></li>
            <li><a href="tournaments.html">🏆 Tournaments</a></li>
            <li><a href="teams.html">🛡️ Teams</a></li>
            <li><a href="players.html">👤 Players</a></li>
            <li><a href="matches.html">⚽ Matches</a></li>
            <li><a href="stats.html">📊 Statistics</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="header">
            <h1>System Summary</h1>
           <button onclick="logout()" style="padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer;">Logout</button>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Active Tournaments</h3>
                <div class="number" id="tourney-count">0</div>
            </div>
            <div class="card">
                <h3>Registered Teams</h3>
                <div class="number" id="team-count">0</div>
            </div>
            <div class="card">
                <h3>Registered Players</h3>
                <div class="number" id="player-count">0</div>
            </div>
            <div class="card">
                <h3>Matches Played</h3>
                <div class="number" id="match-count">0</div>
            </div>
        </div>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://jjbmucvgnwxqvegqktqo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqYm11Y3Znbnd4cXZlZ3FrdHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDg3NzEsImV4cCI6MjA5NDA4NDc3MX0.f2RzHJ1WdoMGgASWK3Xs2KO6gg_DR_ZZN3F0cMlujVE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.addEventListener('DOMContentLoaded', () => {
        const role = localStorage.getItem('userRole');
        if (!role) { window.location.href = 'login.html'; return; }

        if (role === 'manager') {
            const adminOnly = ['Users']; 
            document.querySelectorAll('.sidebar ul li a').forEach(link => {
                if (adminOnly.some(text => link.innerText.includes(text))) {
                    link.parentElement.style.display = 'none';
                }
            });
        }
        updateDashboard();
    });

    async function updateDashboard() {
        const tables = ['tournaments', 'teams', 'players', 'matches']; 
        const counts = await Promise.all(tables.map(async (table) => {
            const { count, error } = await supabaseClient.from(table).select('*', { count: 'exact', head: true });
            return error ? 0 : count;
        }));
        document.getElementById('tourney-count').innerText = counts[0] || 0;
        document.getElementById('team-count').innerText = counts[1] || 0;
        document.getElementById('player-count').innerText = counts[2] || 0;
        document.getElementById('match-count').innerText = counts[3] || 0;
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
