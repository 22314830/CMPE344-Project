<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Sports Tournament System</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #111827;
            --text-dark: #1f2937;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 { color: var(--text-dark); margin-bottom: 10px; font-size: 1.8rem; }
        .login-container p { color: #6b7280; margin-bottom: 30px; font-size: 0.9rem; }

        .form-control { margin-bottom: 20px; text-align: left; }
        .form-control label { display: block; margin-bottom: 5px; font-weight: 500; color: #374151; font-size: 0.9rem; }
        .form-control input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        .form-control input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .btn-login:hover:not(:disabled) { background-color: var(--primary-hover); }

        .error-message {
            color: #dc2626;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .hint { margin-top: 20px; font-size: 0.8rem; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login to the System</h2>
        <p>Authorization is checked via the database.</p>

        <div class="error-message" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter Your Username" required> 
            </div>
            
            <div class="form-control">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Your Password" required>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">Login</button>
        </form>

        <div class="hint">
            This System Only For <strong>Coaches</strong> 
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://jjbmucvgnwxqvegqktqo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqYm11Y3Znbnd4cXZlZ3FrdHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDg3NzEsImV4cCI6MjA5NDA4NDc3MX0.f2RzHJ1WdoMGgASWK3Xs2KO6gg_DR_ZZN3F0cMlujVE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const uname = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        const { data, error } = await supabaseClient
            .from('users') 
            .select('*')
            .eq('username', uname) 
            .eq('password', pass) 
            .single();

        if (data) {
            localStorage.setItem('userRole', data.role.toLowerCase()); 
            localStorage.setItem('username', data.username);
            alert('Login Succesfully!');
            window.location.href = 'index.html';
        } else {
            alert('Incorrect username or password!');
        }
    });
</script>

</body>
</html>
